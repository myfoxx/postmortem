name = "postmortem-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name       = "VAULT"
class_name = "VaultObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["VaultObject"]

[[r2_buckets]]
binding    = "AUDIO_BUCKET"
bucket_name = "postmortem-audio"

[vars]
FRONTEND_URL = "https://postmortem.cybersartoria.it"

# Secrets (set via wrangler secret put):
# ELEVENLABS_API_KEY
